# Self-signed TLS Certificate for Akeyless Gateway
#
# The gateway is internal-only, accessed directly via its LoadBalancer IP.
# No ingress controller or domain required.
#
# Apply with:
#   kubectl apply -f demo/gateway-ingress.yaml
#
# Then set:
#   export AKEYLESS_GATEWAY_URL="https://192.168.1.82:8000"
#
# Note: self-signed cert — browsers and CLIs will show a warning.
# Add the CA to your trust store, or use --insecure where supported.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned-clusterissuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: akeyless-gateway-tls
  namespace: akeyless
spec:
  secretName: akeyless-gateway-tls
  issuerRef:
    name: selfsigned-clusterissuer
    kind: ClusterIssuer
  commonName: akeyless-gateway
  ipAddresses:
    - 192.168.1.82
  duration: 8760h    # 1 year
  renewBefore: 720h  # renew 30 days before expiry
