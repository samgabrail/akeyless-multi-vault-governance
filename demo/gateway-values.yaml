# =============================================================================
# Akeyless Gateway - Helm Values (Demo / Home Lab)
# =============================================================================
#
# Chart: akeyless/akeyless-gateway  (akeylesslabs.github.io/helm-charts)
#
# Add the Helm repository:
#   helm repo add akeyless https://akeylesslabs.github.io/helm-charts
#   helm repo update
#
# Pre-create the credentials secret before deploying:
#   kubectl create secret generic akeyless-gateway-credentials \
#     --namespace akeyless \
#     --from-literal=gateway-access-key=<YOUR_AKEYLESS_ACCESS_KEY>
#
# Deploy with:
#   helm upgrade --install akeyless-gw akeyless/akeyless-gateway \
#     --namespace akeyless \
#     --create-namespace \
#     --values demo/gateway-values.yaml
#
# Gateway Config Manager: http://<EXTERNAL-IP>:8000
#
# Topology note:
#   This file configures a single Gateway for the demo only.
#   Production deployments typically run one Gateway per private location/region
#   (for example, us-east Vault + us-east Gateway, us-central Vault + us-central Gateway).
# =============================================================================

globalConfig:
  gatewayAuth:
    # Your Akeyless access ID (format: p-xxxxxxxxxxxx)
    gatewayAccessId: "p-9l5fttqf5q2iam"
    gatewayAccessType: access_key
    # K8s secret must contain key: gateway-access-key
    gatewayCredentialsExistingSecret: "akeyless-gateway-credentials"

  # Grant this access ID full admin rights on the Gateway
  allowedAccessPermissions:
    - name: Administrators
      access_id: "p-9l5fttqf5q2iam"
      permissions:
        - admin

  # Self-signed TLS cert issued by cert-manager (selfsigned-clusterissuer)
  # IP SAN: 192.168.1.82  — access via https://192.168.1.82:8000
  # Secret created by: kubectl apply -f demo/gateway-ingress.yaml
  TLSConf:
    enabled: true
    tlsExistingSecret: "akeyless-gateway-tls"
    tlsCertificateSecretKeyName: tls.crt
    tlsPrivateKeySecretKeyName: tls.key

gateway:
  deployment:
    replicaCount: 1

  service:
    type: LoadBalancer
